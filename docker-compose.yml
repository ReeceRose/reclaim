services:
  reclaim:
    build: .
    # After a release: docker pull ghcr.io/reecerose/reclaim:<version>
    image: ghcr.io/reecerose/reclaim:latest
    ports:
      - "8080:8080"
    volumes:
      # Edit host paths to match your NAS layout (must be read-write)
      - /mnt/movies:/movies:rw
      - /mnt/tv:/tv:rw
      # On a NAS, prefer a host appdata path instead of a named volume, e.g.:
      # - /mnt/user/appdata/reclaim:/data:rw
      - reclaim-data:/data
    environment:
      MOVIES_PATH: /movies
      TV_PATH: /tv
      DB_PATH: /data/reclaim.db
      # Encode window — worker only pulls jobs between these times (HH:MM local)
      ENCODE_WINDOW_START: "00:00"
      ENCODE_WINDOW_END: "06:00"
      # Set TZ to match your local timezone so the window fires at the right time
      TZ: America/New_York
      SCAN_INTERVAL: 24h
      PROBE_CONCURRENCY: "4"
      # Auth escape hatches — uncomment only when needed, never leave enabled
      # DISABLE_AUTH: "true"
      # RESET_AUTH: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  reclaim-data:

<svg width="780" height="256" viewBox="0 0 780 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reclaim">
  <defs>
    <linearGradient id="reclaim-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e1e"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <pattern id="reclaim-scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.018"/>

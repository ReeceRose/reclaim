  </defs>

  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#reclaim-bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#reclaim-scan)"/>
  <rect x="0.75" y="0.75" width="254.5" height="254.5" rx="57.25" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <rect x="60" y="62" width="136" height="132" rx="18" fill="none" stroke="#2e6ce0" stroke-width="11"/>

  <g stroke="#4589ff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="128" y1="86" x2="128" y2="138"/>
    <polyline points="104,116 128,140 152,116"/>
  </g>

  <rect x="80" y="162" width="96" height="16" rx="8" fill="#262626"/>
  <rect x="80" y="162" width="44" height="16" rx="8" fill="#4589ff"/>
  <rect x="80" y="162" width="20" height="16" rx="8" fill="#42be65"/>

  <text x="296" y="170" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="124" letter-spacing="-4">
    <tspan fill="#f4f4f4">Re</tspan><tspan fill="#4589ff">claim</tspan>
  </text>
</svg>
